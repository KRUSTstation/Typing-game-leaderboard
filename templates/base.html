<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>{% block title %}Makers{% endblock %}</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
      tailwind.config = {
         theme: {
            extend: {
               fontFamily: { sans: ['-apple-system', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'] },
               colors: {
                  surface: '#f5f5f7',
                  border: '#d2d2d7',
                  muted: '#6e6e73',
                  accent: '#0071e3',
                  danger: '#ff3b30',
               }
            }
         }
      }
   </script>
   <style>
      body {
         -webkit-font-smoothing: antialiased;
      }

      @keyframes toast-in {
         from {
            opacity: 0;
            transform: translateY(-6px);
         }

         to {
            opacity: 1;
            transform: none;
         }
      }




      @keyframes toast-out {
         to {
            opacity: 0;
            transform: translateY(-6px);
         }
      }

      .toast-in {
         animation: toast-in 0.2s ease forwards, toast-out 0.3s ease 3s forwards;
      }
   </style>
</head>

<body class="bg-white text-[#1d1d1f] font-sans text-[15px] min-h-screen">

   <!-- Navigatory -->
   <header class="sticky top-0 z-50 h-[52px] px-8 flex items-center justify-between
                 border-b border-border bg-white/80 backdrop-blur-xl">
      <a href="{{ url_for('home') }}"
         class="text-[17px] font-semibold tracking-tight no-underline text-[#1d1d1f]">Makers</a>
      <nav class="flex gap-6 text-sm text-muted">
         <a href="{{ url_for('leaderboard.view') }}" class="hover:text-[#1d1d1f] transition-colors">Leaderboard</a>
      </nav>
   </header>

   <!-- Content~ -->
   <main class="max-w-2xl mx-auto px-6 py-12">
      <h2 class="text-[28px] font-bold tracking-tight mb-7">{% block header %}{% endblock %}</h2>
      {% block body %}{% endblock %}
   </main>

   <!-- Toast -->
   <div class="fixed top-16 right-5 z-50 flex flex-col gap-2">
      {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="toast-in flex items-center gap-2 px-4 py-3 rounded-xl bg-white
                  border border-border text-sm min-w-[200px] shadow-sm
                  {{ 'border-l-2 border-l-accent' if category == 'success' else 'border-l-2 border-l-danger' }}">
         <span class="{{ 'text-accent' if category == 'success' else 'text-danger' }}">
            {{ '✓' if category == 'success' else '✗' }}
         </span>
         {{ message }}
      </div>
      {% endfor %}
   </div>

</body>

</html>
