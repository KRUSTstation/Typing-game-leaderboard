<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Makers{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <a href="{{ url_for('home') }}" class="site-logo">Makers</a>
    <nav class="site-nav">
      <a href="{{ url_for('leaderboard.view') }}">Leaderboard</a>
    </nav>
  </header>

  <!-- Main -->
  <main>
    {% block body %}{% endblock %}
  </main>

  <!-- Toast container -->
  <div id="toast-container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="toast {{ category }}">
      <span>{{ '✓' if category == 'success' else '✗' }}</span>
      {{ message }}
    </div>
    {% endfor %}
  </div>

</body>
</html>
